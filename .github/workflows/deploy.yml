name: Deploy to GitHub Pages

# DISABLED: only runs on manual trigger until we're ready to go live
# Change to push trigger when Cloudflare reverse proxy is configured
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9" xmlns:xhtml="http://www.w3.org/1999/xhtml">' >> sitemap.xml
          find blog versus tools playbooks templates -name "*.html" -not -name "template.html" -not -name "template-versus.html" | sort | while read f; do
            # Convert file path to production URL
            # blog/slug.html â†’ /blog/slug (EN, root)
            # blog/fr/slug.html â†’ /fr/blog/slug (locale)
            # versus/slug.html â†’ /versus/slug
            filepath=$(echo "$f" | sed 's/\.html$//')

            # Handle locale blog paths: blog/{lang}/slug â†’ /{lang}/blog/slug
            # Handle index pages: blog/index â†’ /blog, blog/fr/index â†’ /fr/blog
            if echo "$filepath" | grep -qE '^blog/(fr|de|es|it)/index$'; then
              lang=$(echo "$filepath" | sed 's|^blog/\([a-z][a-z]\)/index|\1|')
              url_path="/${lang}/blog"
            elif echo "$filepath" | grep -qE '^blog/index$'; then
              url_path="/blog"
            elif echo "$filepath" | grep -qE '^blog/(fr|de|es|it)/'; then
              lang=$(echo "$filepath" | sed 's|^blog/\([a-z][a-z]\)/.*|\1|')
              slug=$(echo "$filepath" | sed 's|^blog/[a-z][a-z]/||')
              url_path="/${lang}/blog/${slug}"
            else
              url_path="/${filepath}"
            fi

            lastmod=$(git log -1 --format="%aI" -- "$f" 2>/dev/null || date -Iseconds)
            echo "  <url><loc>https://overloop.com${url_path}</loc><lastmod>${lastmod}</lastmod></url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml
          echo "Generated sitemap with $(grep -c '<url>' sitemap.xml) URLs"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
