<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <linearGradient id="lgm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfd"/>
      <stop offset="100%" stop-color="#f5f5fa"/>
    </linearGradient>
  </defs>
  <!-- Window chrome -->
  <rect width="1400" height="800" rx="12" fill="#231932"/>
  <rect x="0" y="0" width="1400" height="40" rx="12" fill="#2e2140"/>
  <rect x="0" y="28" width="1400" height="12" fill="#2e2140"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="700" y="25" text-anchor="middle" fill="#9988bb" font-family="system-ui" font-size="13">La Growth Machine - Multichannel Campaigns</text>

  <!-- Sidebar -->
  <rect x="0" y="40" width="220" height="760" fill="#231932"/>
  <text x="30" y="75" fill="#3CC878" font-family="system-ui" font-weight="700" font-size="16">LGM</text>
  <text x="65" y="75" fill="white" font-family="system-ui" font-weight="400" font-size="14">La Growth Machine</text>
  <rect x="15" y="95" width="190" height="36" rx="6" fill="#3CC878" opacity="0.15"/>
  <text x="50" y="118" fill="#3CC878" font-family="system-ui" font-weight="600" font-size="13">Campaigns</text>
  <text x="50" y="153" fill="#9988bb" font-family="system-ui" font-size="13">Leads</text>
  <text x="50" y="183" fill="#9988bb" font-family="system-ui" font-size="13">Inbox</text>
  <text x="50" y="213" fill="#9988bb" font-family="system-ui" font-size="13">Enrichment</text>
  <text x="50" y="243" fill="#9988bb" font-family="system-ui" font-size="13">Identities</text>
  <text x="50" y="273" fill="#9988bb" font-family="system-ui" font-size="13">Integrations</text>
  <text x="50" y="303" fill="#9988bb" font-family="system-ui" font-size="13">Analytics</text>
  <text x="50" y="333" fill="#9988bb" font-family="system-ui" font-size="13">Templates</text>
  <text x="50" y="363" fill="#9988bb" font-family="system-ui" font-size="13">Settings</text>

  <!-- Main content -->
  <rect x="220" y="40" width="1180" height="760" fill="url(#lgm-bg)"/>

  <!-- Header -->
  <text x="260" y="85" fill="#231932" font-family="system-ui" font-weight="700" font-size="22">Campaign Builder</text>
  <rect x="1200" y="62" width="160" height="36" rx="8" fill="#3CC878"/>
  <text x="1280" y="85" text-anchor="middle" fill="white" font-family="system-ui" font-weight="600" font-size="13">+ New Campaign</text>

  <!-- Workflow visualization -->
  <rect x="260" y="110" width="1100" height="300" rx="10" fill="white" stroke="#e4e6f0" stroke-width="1"/>
  <text x="285" y="145" fill="#231932" font-family="system-ui" font-weight="600" font-size="16">Multichannel Sequence Flow</text>

  <!-- Start node -->
  <rect x="300" y="180" width="120" height="50" rx="8" fill="#3CC878" opacity="0.15" stroke="#3CC878" stroke-width="1.5"/>
  <text x="360" y="210" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="600" font-size="12">Import Leads</text>
  <text x="360" y="225" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">2,450 contacts</text>
  <!-- Arrow -->
  <line x1="420" y1="205" x2="470" y2="205" stroke="#ccc" stroke-width="2"/>
  <polygon points="468,200 478,205 468,210" fill="#ccc"/>

  <!-- Enrich node -->
  <rect x="480" y="180" width="120" height="50" rx="8" fill="#297DFF" opacity="0.15" stroke="#297DFF" stroke-width="1.5"/>
  <text x="540" y="210" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="600" font-size="12">Enrich</text>
  <text x="540" y="225" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Email + Phone</text>
  <!-- Arrow -->
  <line x1="600" y1="205" x2="650" y2="205" stroke="#ccc" stroke-width="2"/>
  <polygon points="648,200 658,205 648,210" fill="#ccc"/>

  <!-- LinkedIn node (top branch) -->
  <rect x="660" y="160" width="140" height="40" rx="8" fill="#0077b5" opacity="0.15" stroke="#0077b5" stroke-width="1.5"/>
  <text x="730" y="184" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="500" font-size="11">LinkedIn Connect</text>
  <!-- Email node (bottom branch) -->
  <rect x="660" y="215" width="140" height="40" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="730" y="239" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="500" font-size="11">Email Step 1</text>

  <!-- Branch arrows -->
  <line x1="658" y1="200" x2="658" y2="180" stroke="#ccc" stroke-width="1.5"/>
  <line x1="658" y1="210" x2="658" y2="215" stroke="#ccc" stroke-width="1.5"/>

  <!-- Arrow from LinkedIn -->
  <line x1="800" y1="180" x2="860" y2="180" stroke="#ccc" stroke-width="2"/>
  <polygon points="858,175 868,180 858,185" fill="#ccc"/>
  <!-- Arrow from Email -->
  <line x1="800" y1="235" x2="860" y2="235" stroke="#ccc" stroke-width="2"/>
  <polygon points="858,230 868,235 858,240" fill="#ccc"/>

  <!-- Wait node -->
  <rect x="870" y="160" width="100" height="40" rx="8" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="920" y="184" text-anchor="middle" fill="#666" font-family="system-ui" font-size="11">Wait 3 days</text>
  <rect x="870" y="215" width="100" height="40" rx="8" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="920" y="239" text-anchor="middle" fill="#666" font-family="system-ui" font-size="11">Wait 2 days</text>

  <!-- Follow-up nodes -->
  <line x1="970" y1="180" x2="1020" y2="180" stroke="#ccc" stroke-width="2"/>
  <rect x="1020" y="160" width="130" height="40" rx="8" fill="#0077b5" opacity="0.15" stroke="#0077b5" stroke-width="1.5"/>
  <text x="1085" y="184" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="500" font-size="11">LinkedIn Message</text>

  <line x1="970" y1="235" x2="1020" y2="235" stroke="#ccc" stroke-width="2"/>
  <rect x="1020" y="215" width="130" height="40" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="1085" y="239" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="500" font-size="11">Email Follow-up</text>

  <!-- Final merge -->
  <line x1="1150" y1="180" x2="1210" y2="205" stroke="#ccc" stroke-width="1.5"/>
  <line x1="1150" y1="235" x2="1210" y2="210" stroke="#ccc" stroke-width="1.5"/>
  <rect x="1210" y="190" width="100" height="40" rx="20" fill="#3CC878" opacity="0.2" stroke="#3CC878" stroke-width="1.5"/>
  <text x="1260" y="214" text-anchor="middle" fill="#231932" font-family="system-ui" font-weight="600" font-size="11">Goal: Reply</text>

  <!-- Stats row -->
  <text x="300" y="310" fill="#666" font-family="system-ui" font-size="11">Leads: 2,450</text>
  <text x="500" y="310" fill="#666" font-family="system-ui" font-size="11">Enriched: 2,180 (89%)</text>
  <text x="730" y="310" fill="#666" font-family="system-ui" font-size="11">Contacted: 1,940</text>
  <text x="960" y="310" fill="#666" font-family="system-ui" font-size="11">Replied: 287 (14.8%)</text>
  <text x="1180" y="310" fill="#3CC878" font-family="system-ui" font-weight="600" font-size="11">Meetings: 43</text>

  <!-- Campaign list -->
  <rect x="260" y="430" width="1100" height="310" rx="10" fill="white" stroke="#e4e6f0" stroke-width="1"/>
  <text x="285" y="465" fill="#231932" font-family="system-ui" font-weight="600" font-size="16">All Campaigns</text>

  <rect x="260" y="480" width="1100" height="38" fill="#f8f8fc"/>
  <text x="285" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">CAMPAIGN</text>
  <text x="530" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">CHANNELS</text>
  <text x="700" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">LEADS</text>
  <text x="800" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">ENRICHED</text>
  <text x="910" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">CONTACTED</text>
  <text x="1030" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">REPLIED</text>
  <text x="1150" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">MEETINGS</text>
  <text x="1270" y="504" fill="#888" font-family="system-ui" font-weight="500" font-size="11">STATUS</text>

  <text x="285" y="545" fill="#231932" font-family="system-ui" font-size="13">Q2 SaaS Founders</text>
  <text x="530" y="545" fill="#231932" font-family="system-ui" font-size="13">LI + Email</text>
  <text x="700" y="545" fill="#231932" font-family="system-ui" font-size="13">2,450</text>
  <text x="800" y="545" fill="#231932" font-family="system-ui" font-size="13">2,180</text>
  <text x="910" y="545" fill="#231932" font-family="system-ui" font-size="13">1,940</text>
  <text x="1030" y="545" fill="#231932" font-family="system-ui" font-size="13">287</text>
  <text x="1150" y="545" fill="#231932" font-family="system-ui" font-size="13">43</text>
  <rect x="1265" y="531" width="55" height="22" rx="11" fill="#d4edda"/>
  <text x="1275" y="546" fill="#28a745" font-family="system-ui" font-size="11">Active</text>
  <line x1="260" y1="560" x2="1360" y2="560" stroke="#f0f2f5" stroke-width="1"/>

  <text x="285" y="590" fill="#231932" font-family="system-ui" font-size="13">Agency Decision Makers</text>
  <text x="530" y="590" fill="#231932" font-family="system-ui" font-size="13">LI + Email + Twitter</text>
  <text x="700" y="590" fill="#231932" font-family="system-ui" font-size="13">1,820</text>
  <text x="800" y="590" fill="#231932" font-family="system-ui" font-size="13">1,650</text>
  <text x="910" y="590" fill="#231932" font-family="system-ui" font-size="13">1,420</text>
  <text x="1030" y="590" fill="#231932" font-family="system-ui" font-size="13">198</text>
  <text x="1150" y="590" fill="#231932" font-family="system-ui" font-size="13">31</text>
  <rect x="1265" y="576" width="55" height="22" rx="11" fill="#d4edda"/>
  <text x="1275" y="591" fill="#28a745" font-family="system-ui" font-size="11">Active</text>
  <line x1="260" y1="605" x2="1360" y2="605" stroke="#f0f2f5" stroke-width="1"/>

  <text x="285" y="635" fill="#231932" font-family="system-ui" font-size="13">E-commerce CMOs EU</text>
  <text x="530" y="635" fill="#231932" font-family="system-ui" font-size="13">Email only</text>
  <text x="700" y="635" fill="#231932" font-family="system-ui" font-size="13">3,100</text>
  <text x="800" y="635" fill="#231932" font-family="system-ui" font-size="13">2,890</text>
  <text x="910" y="635" fill="#231932" font-family="system-ui" font-size="13">2,890</text>
  <text x="1030" y="635" fill="#231932" font-family="system-ui" font-size="13">341</text>
  <text x="1150" y="635" fill="#231932" font-family="system-ui" font-size="13">52</text>
  <rect x="1265" y="621" width="70" height="22" rx="11" fill="#cce5ff"/>
  <text x="1273" y="636" fill="#004085" font-family="system-ui" font-size="11">Completed</text>
